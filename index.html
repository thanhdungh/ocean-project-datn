<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ocean 3D</title>
  <link rel="stylesheet" href="style.css">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="webgl"></canvas>

  <div id="intro-screen">
    <div id="intro-panel">
      <div class="intro-eyebrow">Ocean Intro</div>
      <h1>Load Boat</h1>
      <p id="loading-text">Loading 3D Boat...</p>
      <p id="progress">0%</p>
      <button id="startBtn">Start</button>
      <div class="intro-help">W/S: Move Forward/Backward, A/D: Rotate Boat</div>
    </div>
  </div>

  <button id="diveBtn">Lặn</button>
  <div id="overlay"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
